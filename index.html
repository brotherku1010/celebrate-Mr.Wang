<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>您有專屬畢業祝賀</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fff0f3;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .card-container {
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            padding-bottom: 24px;
        }

        /* --- 圖片展示區 (加入相對定位以放置左右按鈕) --- */
        .image-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px; 
            background-color: rgba(0,0,0,0.03); /* 稍微有點底色襯托 */
        }

        /* 共用於圖片與影片的樣式 */
        .media-content {
            width: 100%;
            height: auto;
            max-height: 60vh; /* 避免直式圖片或影片過長佔滿螢幕 */
            object-fit: contain; 
            display: block;
        }

        /* --- 左右切換箭頭按鈕 --- */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.4);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
            z-index: 10;
        }
        .nav-btn:hover { background-color: rgba(0, 0, 0, 0.7); }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        /* --- 頁碼與文字樣式 --- */
        .page-indicator {
            font-size: 14px;
            color: #666;
            margin-top: 15px;
            font-weight: bold;
        }
        
        .greeting-text {
            margin-top: 5px;
            font-size: 22px;
            color: #1e3c72;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* --- 按鈕樣式 (維持不變) --- */
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #FFD700; 
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #FFD700;
        }
        .download-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(30, 60, 114, 0.3);
        }
    </style>
</head>
<body>

    <div class="card-container">
        
        <div class="image-wrapper" id="imageWrapper">
            <button class="nav-btn prev-btn" id="prevBtn" style="display: none;">❮</button>
            
            <div id="loadingText" style="padding: 50px; color: #1e3c72; font-weight: bold;">🎓 資料載入中...</div>
            
            <div id="mediaContainer" style="width: 100%; display: none;"></div>
            
            <button class="nav-btn next-btn" id="nextBtn" style="display: none;">❯</button>
        </div>

        <div class="page-indicator" id="pageIndicator"></div>

        <div class="greeting-text" id="greetingText">🎓 畢業快樂 🎓</div>
        
        <a href="#" download="" class="download-btn" id="downloadBtn" style="display: none;">
            📥 點擊下載
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            let cardData = [];
            let currentIndex = 0;

            const mediaContainer = document.getElementById('mediaContainer');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const loadingText = document.getElementById('loadingText');
            const pageIndicator = document.getElementById('pageIndicator');
            const greetingText = document.getElementById('greetingText');

            // 核心功能：切換畫面與連動資料
            function updateView() {
                if (cardData.length === 0) return;
                const card = cardData[currentIndex];
                
                // 1. 清空目前的影像
                mediaContainer.innerHTML = '';
                
                // 2. 判斷是圖片還是影片 (MOV 或 MP4)
                const fileExt = card.fileName.split('.').pop().toUpperCase();
                if (fileExt === 'MOV' || fileExt === 'MP4') {
                    const video = document.createElement('video');
                    video.src = card.fileName;
                    video.className = 'media-content';
                    video.controls = true; // 顯示播放條
                    video.playsInline = true; // 讓手機可以在網頁內播放而不強制全螢幕
                    mediaContainer.appendChild(video);
                } else {
                    const img = document.createElement('img');
                    img.src = card.fileName;
                    img.alt = `${card.name}的祝賀卡`;
                    img.className = 'media-content';
                    mediaContainer.appendChild(img);
                }

                // 3. 更新下載按鈕的連結與預設檔名
                downloadBtn.href = card.fileName;
                downloadBtn.download = card.downloadName;
                
                // 4. 動態顯示名字
                greetingText.innerText = `🎓 ${card.name} 🎓`;

                // 5. 更新目前的頁數 (例如: 1 / 13)
                pageIndicator.innerText = `${currentIndex + 1} / ${cardData.length}`;

                // 6. 判斷左/右按鈕是否需要隱藏 (第一張藏左邊，最後一張藏右邊)
                prevBtn.style.display = currentIndex > 0 ? 'flex' : 'none';
                nextBtn.style.display = currentIndex < cardData.length - 1 ? 'flex' : 'none';
            }

            // 綁定左箭頭點擊事件
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateView();
                }
            });

            // 綁定右箭頭點擊事件
            nextBtn.addEventListener('click', () => {
                if (currentIndex < cardData.length - 1) {
                    currentIndex++;
                    updateView();
                }
            });

            // 啟動：讀取 JSON
            try {
                const response = await fetch('cards.json');
                cardData = await response.json();

                if (cardData.length > 0) {
                    loadingText.style.display = 'none';
                    mediaContainer.style.display = 'block';
                    downloadBtn.style.display = 'inline-block';
                    updateView(); // 載入第一張畫面
                } else {
                    loadingText.innerText = '名單內目前沒有卡片資料。';
                }
            } catch (error) {
                console.error('JSON 讀取失敗:', error);
                loadingText.innerText = '載入失敗，請確認 cards.json 是否正確上傳。';
            }
        });
    </script>
</body>
</html>
