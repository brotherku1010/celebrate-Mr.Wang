<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>您有專屬畢業祝賀</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fff0f3;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .card-container {
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px; 
            background-color: rgba(0,0,0,0.03);
        }

        .media-content {
            width: 100%;
            height: auto;
            max-height: 60vh; 
            object-fit: contain; 
            display: block;
        }

        /* --- 文字與按鈕的包裝區塊 --- */
        .info-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* --- 左右切換箭頭按鈕 (放大並移出卡片外) --- */
        .nav-btn {
            position: fixed; /* 固定在螢幕上，不受卡片限制 */
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 2px solid rgba(255,255,255,0.3); /* 加點邊框更有質感 */
            width: 50px;  /* 放大按鈕寬度 */
            height: 50px; /* 放大按鈕高度 */
            border-radius: 50%;
            font-size: 24px; /* 放大箭頭 */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100; /* 確保疊在最上層 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav-btn:hover { background-color: rgba(0, 0, 0, 0.8); transform: translateY(-50%) scale(1.1); }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        /* --- 頁碼與文字樣式 --- */
        .page-indicator {
            font-size: 14px;
            color: #666;
            margin-top: 15px;
            font-weight: bold;
        }
        
        .greeting-text {
            margin-top: 5px;
            font-size: 22px;
            color: #1e3c72;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* --- 下載按鈕 --- */
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #FFD700; 
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #FFD700;
        }
        .download-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(30, 60, 114, 0.3);
        }

        /* =========================================
           橫擺螢幕 (Landscape) 專屬排版優化
           ========================================= */
        @media (orientation: landscape) {
            .nav-btn {
                width: 60px; /* 橫向時螢幕兩側空間大，按鈕再放大 */
                height: 60px;
                font-size: 28px;
                margin: 0 20px;
            }
            .card-container {
                max-width: 800px; /* 放寬卡片容器 */
                width: 85%;
                flex-direction: row; /* 改成左右分欄排列 */
                padding-bottom: 0;
                padding: 15px;
                align-items: center;
                gap: 20px;
            }
            .image-wrapper {
                flex: 1; /* 圖片區自動撐開佔據主要空間 */
                border-radius: 8px; /* 橫向時給圖片區一點圓角 */
                overflow: hidden;
            }
            .media-content {
                max-height: 85vh; /* 橫向時，高度最大化，看得更清楚 */
            }
            .info-wrapper {
                width: 250px; /* 文字與按鈕區塊固定寬度 */
                padding-right: 15px;
                justify-content: center;
            }
            .greeting-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <button class="nav-btn prev-btn" id="prevBtn" style="display: none;">❮</button>

    <div class="card-container">
        
        <div class="image-wrapper" id="imageWrapper">
            <div id="loadingText" style="padding: 50px; color: #1e3c72; font-weight: bold;">🎓 資料載入中...</div>
            <div id="mediaContainer" style="width: 100%; display: none;"></div>
        </div>

        <div class="info-wrapper">
            <div class="page-indicator" id="pageIndicator"></div>
            <div class="greeting-text" id="greetingText">🎓 畢業快樂 🎓</div>
            <a href="#" download="" class="download-btn" id="downloadBtn" style="display: none;">
                📥 點擊下載
            </a>
        </div>
    </div>

    <button class="nav-btn next-btn" id="nextBtn" style="display: none;">❯</button>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            let cardData = [];
            let currentIndex = 0;

            const mediaContainer = document.getElementById('mediaContainer');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const loadingText = document.getElementById('loadingText');
            const pageIndicator = document.getElementById('pageIndicator');
            const greetingText = document.getElementById('greetingText');

            function updateView() {
                if (cardData.length === 0) return;
                const card = cardData[currentIndex];
                
                mediaContainer.innerHTML = '';
                
                const fileExt = card.fileName.split('.').pop().toUpperCase();
                if (fileExt === 'MOV' || fileExt === 'MP4') {
                    const video = document.createElement('video');
                    video.src = card.fileName;
                    video.className = 'media-content';
                    video.controls = true;
                    video.playsInline = true;
                    mediaContainer.appendChild(video);
                } else {
                    const img = document.createElement('img');
                    img.src = card.fileName;
                    img.alt = `${card.name}的祝賀卡`;
                    img.className = 'media-content';
                    mediaContainer.appendChild(img);
                }

                downloadBtn.href = card.fileName;
                downloadBtn.download = card.downloadName;
                
                // === 👇 新增的擷取座號邏輯 👇 ===
                let seatNo = "";
                // 嘗試從檔名中找出 "NO.數字" (不分大小寫)
                let match = card.fileName.match(/NO\.\d+/i); 
                
                if (match) {
                    // 如果檔名裡有 "NO.1"，就把它抓出來並轉大寫
                    seatNo = match[0].toUpperCase();
                } else {
                    // (備用) 如果檔名只有數字開頭，例如 "1_王小明.jpg"，就自動幫它加上 "NO."
                    let numMatch = card.fileName.match(/^\d+/);
                    if (numMatch) {
                        seatNo = `NO.${numMatch[0]}`;
                    }
                }

                // 將座號與名字組合顯示
                if (seatNo) {
                    greetingText.innerText = `${seatNo} ${card.name}`;
                } else {
                    // 萬一檔名找不到數字防呆，就維持只顯示名字
                    greetingText.innerText = `${card.name}`;
                }
                // === 👆 新增的擷取座號邏輯 👆 ===

                pageIndicator.innerText = `${currentIndex + 1} / ${cardData.length}`;

                prevBtn.style.display = currentIndex > 0 ? 'flex' : 'none';
                nextBtn.style.display = currentIndex < cardData.length - 1 ? 'flex' : 'none';
            }

            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateView();
                }
            });

            nextBtn.addEventListener('click', () => {
                if (currentIndex < cardData.length - 1) {
                    currentIndex++;
                    updateView();
                }
            });

            try {
                const response = await fetch('cards.json');
                cardData = await response.json();

                if (cardData.length > 0) {
                    loadingText.style.display = 'none';
                    mediaContainer.style.display = 'block';
                    downloadBtn.style.display = 'inline-block';
                    updateView(); 
                } else {
                    loadingText.innerText = '名單內目前沒有卡片資料。';
                }
            } catch (error) {
                console.error('JSON 讀取失敗:', error);
                loadingText.innerText = '載入失敗，請確認 cards.json 是否正確上傳。';
            }
        });
    </script>
</body>
</html>
